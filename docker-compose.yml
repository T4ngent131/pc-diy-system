services:
  backend:
    build:
      context: ./backend
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://db:3306/pc_diy?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: root
      DB_PASSWORD: root123
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
    depends_on:
      - backend
    ports:
      - "80:80"

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: pc_diy
      MYSQL_ROOT_PASSWORD: root123
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  mysql_data:
